version: '3.8'

services:
  # Base de Datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Aplicación de Streamlit
  web:
    build: .
    container_name: streamlit_basket_app
    restart: always
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app  # Esto sincroniza tus cambios en caliente. Si editas código, se ve en vivo.
      - /app/.venv  # Evita que Docker use tu entorno virtual de Windows

volumes:
  postgres_data: